<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>系統程式設計 — 互動教材</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Noto+Serif+TC:wght@400;700;900&family=Space+Grotesk:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d1117;
  --surface: #161b22;
  --surface2: #1c2330;
  --border: #30363d;
  --text: #e6edf3;
  --text-muted: #8b949e;
  --accent: #58a6ff;
  --accent2: #3fb950;
  --accent3: #f78166;
  --accent4: #d2a8ff;
  --yellow: #e3b341;
  --terminal-bg: #010409;
  --terminal-green: #39d353;
  --terminal-red: #f85149;
  --terminal-blue: #58a6ff;
  --terminal-yellow: #e3b341;
  --terminal-purple: #d2a8ff;
  --terminal-cyan: #39c5cf;
  --chapter-h: 56px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Space Grotesk', sans-serif;
  display: flex;
  height: 100vh;
  overflow: hidden;
}

/* ── SIDEBAR ── */
#sidebar {
  width: 260px;
  min-width: 260px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  z-index: 10;
}

.sidebar-logo {
  padding: 24px 20px 16px;
  border-bottom: 1px solid var(--border);
}
.sidebar-logo h1 {
  font-family: 'Noto Serif TC', serif;
  font-size: 18px;
  font-weight: 900;
  color: var(--accent);
  line-height: 1.3;
}
.sidebar-logo p {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 4px;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}

.sidebar-nav { padding: 12px 0; flex: 1; }

.nav-chapter {
  padding: 0;
}

.nav-chapter-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 20px;
  cursor: pointer;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  transition: color 0.2s;
  user-select: none;
}
.nav-chapter-header:hover { color: var(--text); }
.nav-chapter-header.active { color: var(--accent); }

.nav-section-btn {
  display: block;
  width: 100%;
  text-align: left;
  background: none;
  border: none;
  padding: 7px 20px 7px 36px;
  font-size: 13px;
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.15s;
  font-family: 'Space Grotesk', sans-serif;
  border-left: 2px solid transparent;
  margin-left: 0;
}
.nav-section-btn:hover { color: var(--text); background: rgba(255,255,255,0.04); }
.nav-section-btn.active { color: var(--accent); border-left-color: var(--accent); background: rgba(88,166,255,0.08); }

/* ── MAIN ── */
#main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

#topbar {
  height: 48px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 24px;
  gap: 8px;
  font-size: 13px;
  color: var(--text-muted);
  flex-shrink: 0;
}
.breadcrumb-sep { color: var(--border); }
.breadcrumb-active { color: var(--text); font-weight: 600; }

#content {
  flex: 1;
  overflow-y: auto;
  padding: 48px 10%;
}

/* ── CHAPTER HERO ── */
.chapter-hero {
  margin-bottom: 40px;
  padding-bottom: 32px;
  border-bottom: 1px solid var(--border);
}
.chapter-tag {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.chapter-tag::before {
  content: '';
  display: inline-block;
  width: 20px;
  height: 2px;
  background: var(--accent);
}
.chapter-hero h1 {
  font-family: 'Noto Serif TC', serif;
  font-size: 38px;
  font-weight: 900;
  line-height: 1.2;
  color: var(--text);
  margin-bottom: 16px;
}
.chapter-hero p {
  font-size: 16px;
  color: var(--text-muted);
  line-height: 1.7;
  max-width: 680px;
}

/* ── SECTION ── */
.section { margin-bottom: 48px; }
.section-title {
  font-family: 'Noto Serif TC', serif;
  font-size: 22px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.section-title .num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  color: var(--accent);
  background: rgba(88,166,255,0.1);
  border: 1px solid rgba(88,166,255,0.3);
  padding: 2px 8px;
  border-radius: 4px;
}
.section p {
  font-size: 15px;
  line-height: 1.8;
  color: #c9d1d9;
  margin-bottom: 14px;
}
.section ul, .section ol {
  margin: 12px 0 14px 0;
  padding-left: 0;
  list-style: none;
}
.section ul li, .section ol li {
  font-size: 15px;
  color: #c9d1d9;
  padding: 5px 0 5px 24px;
  position: relative;
  line-height: 1.7;
}
.section ul li::before {
  content: '▸';
  position: absolute;
  left: 4px;
  color: var(--accent);
  font-size: 11px;
  top: 7px;
}
.section ol { counter-reset: ol; }
.section ol li::before {
  content: counter(ol);
  counter-increment: ol;
  position: absolute;
  left: 0;
  top: 5px;
  width: 20px;
  height: 20px;
  background: rgba(88,166,255,0.15);
  color: var(--accent);
  font-size: 11px;
  font-weight: 700;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'JetBrains Mono', monospace;
}

/* ── NOTE BOX ── */
.note-box {
  background: rgba(88,166,255,0.06);
  border: 1px solid rgba(88,166,255,0.25);
  border-left: 3px solid var(--accent);
  border-radius: 6px;
  padding: 16px 18px;
  margin: 20px 0;
  font-size: 14px;
  line-height: 1.7;
  color: #c9d1d9;
}
.note-box .note-title {
  color: var(--accent);
  font-weight: 700;
  font-size: 13px;
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.note-warning { border-left-color: var(--yellow); background: rgba(227,179,65,0.06); border-color: rgba(227,179,65,0.25); }
.note-warning .note-title { color: var(--yellow); }
.note-success { border-left-color: var(--accent2); background: rgba(63,185,80,0.06); border-color: rgba(63,185,80,0.25); }
.note-success .note-title { color: var(--accent2); }

/* ── CODE BLOCK ── */
.code-block {
  background: var(--terminal-bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
  margin: 20px 0;
  font-family: 'JetBrains Mono', monospace;
}
.code-header {
  background: var(--surface2);
  border-bottom: 1px solid var(--border);
  padding: 10px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.code-dots { display: flex; gap: 6px; }
.code-dots span {
  width: 12px; height: 12px; border-radius: 50%;
}
.dot-r { background: #f85149; }
.dot-y { background: #e3b341; }
.dot-g { background: #3fb950; }
.code-lang {
  font-size: 11px;
  color: var(--text-muted);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.1em;
}
.code-body {
  padding: 20px;
  overflow-x: auto;
  font-size: 13px;
  line-height: 1.7;
  color: #e6edf3;
  white-space: pre;
}
/* Syntax highlighting classes */
.kw { color: #ff7b72; }   /* keywords */
.fn { color: #d2a8ff; }   /* functions */
.st { color: #a5d6ff; }   /* strings */
.cm { color: #8b949e; font-style: italic; }  /* comments */
.nm { color: #79c0ff; }   /* numbers */
.ty { color: #ffa657; }   /* types */
.pp { color: #d2a8ff; }   /* preprocessor */
.op { color: #ff7b72; }   /* operators */
.hl { background: rgba(88,166,255,0.12); display: block; margin: 0 -20px; padding: 0 20px; }

/* ── TERMINAL SIMULATOR ── */
.terminal-block {
  background: var(--terminal-bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
  margin: 20px 0;
}
.terminal-header {
  background: #1c1c1e;
  border-bottom: 1px solid #2a2a2a;
  padding: 10px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.terminal-dots { display: flex; gap: 6px; }
.terminal-title { font-size: 12px; color: #666; font-family: 'JetBrains Mono', monospace; flex: 1; text-align: center; }
.terminal-body {
  padding: 16px 20px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  line-height: 1.7;
  min-height: 80px;
}
.t-prompt { color: var(--terminal-green); }
.t-cmd { color: #fff; }
.t-out { color: #8b949e; }
.t-green { color: var(--terminal-green); }
.t-blue { color: var(--terminal-blue); }
.t-red { color: var(--terminal-red); }
.t-yellow { color: var(--terminal-yellow); }
.t-purple { color: var(--terminal-purple); }
.t-cyan { color: var(--terminal-cyan); }
.t-bold { font-weight: 700; }

/* ── RUN BUTTON ── */
.run-wrap {
  display: flex;
  justify-content: flex-end;
  margin: -8px 0 4px;
  padding: 0 20px 12px;
  background: var(--terminal-bg);
  border-bottom: 1px solid var(--border);
}
.run-btn {
  background: rgba(63,185,80,0.15);
  border: 1px solid rgba(63,185,80,0.4);
  color: var(--accent2);
  font-size: 12px;
  font-weight: 700;
  font-family: 'JetBrains Mono', monospace;
  padding: 6px 16px;
  border-radius: 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: all 0.2s;
  letter-spacing: 0.05em;
}
.run-btn:hover { background: rgba(63,185,80,0.25); transform: scale(1.03); }
.run-btn.running { background: rgba(227,179,65,0.15); border-color: rgba(227,179,65,0.4); color: var(--yellow); }
.run-btn .icon { font-size: 14px; }

/* ── INTERACTIVE TERMINAL ── */
.interactive-terminal {
  background: var(--terminal-bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
  margin: 20px 0;
}
.interactive-header {
  background: #1c1c1e;
  border-bottom: 1px solid #2a2a2a;
  padding: 10px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.interactive-title { font-size: 12px; color: #888; font-family: 'JetBrains Mono', monospace; flex:1; text-align: center; }
.int-body {
  padding: 16px 20px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  line-height: 1.7;
  min-height: 120px;
  max-height: 260px;
  overflow-y: auto;
}
.int-input-row {
  display: flex;
  align-items: center;
  padding: 8px 20px 12px;
  border-top: 1px solid #1a1a1a;
  gap: 8px;
}
.int-prompt-label { color: var(--terminal-green); font-family: 'JetBrains Mono', monospace; font-size: 13px; white-space: nowrap; }
.int-input {
  flex: 1;
  background: none;
  border: none;
  outline: none;
  color: #fff;
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  caret-color: var(--terminal-green);
}
.int-enter {
  background: rgba(63,185,80,0.1);
  border: 1px solid rgba(63,185,80,0.3);
  color: var(--accent2);
  border-radius: 4px;
  padding: 2px 10px;
  font-size: 11px;
  font-family: 'JetBrains Mono', monospace;
  cursor: pointer;
  transition: all 0.2s;
}
.int-enter:hover { background: rgba(63,185,80,0.25); }

/* ── TABLE ── */
.comp-table {
  width: 100%;
  border-collapse: collapse;
  margin: 20px 0;
  font-size: 13.5px;
  border-radius: 8px;
  overflow: hidden;
  border: 1px solid var(--border);
}
.comp-table th {
  background: var(--surface2);
  padding: 12px 16px;
  text-align: left;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-muted);
  border-bottom: 1px solid var(--border);
}
.comp-table td {
  padding: 11px 16px;
  border-bottom: 1px solid rgba(48,54,61,0.5);
  color: #c9d1d9;
  line-height: 1.6;
}
.comp-table tr:last-child td { border-bottom: none; }
.comp-table tr:hover td { background: rgba(255,255,255,0.02); }
.tag-green { color: var(--accent2); font-weight: 600; }
.tag-red { color: var(--accent3); font-weight: 600; }
.tag-blue { color: var(--accent); font-weight: 600; }

/* ── DIAGRAM ── */
.diagram {
  background: var(--terminal-bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 20px;
  margin: 20px 0;
  overflow-x: auto;
}
.diagram pre {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  line-height: 1.6;
  color: #8b949e;
  white-space: pre;
}
.diagram pre .dg-box { color: #58a6ff; }
.diagram pre .dg-arrow { color: #3fb950; }
.diagram pre .dg-label { color: #e6edf3; font-weight: 600; }
.diagram pre .dg-note { color: #e3b341; }

/* ── QUIZ ── */
.quiz-box {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 20px 24px;
  margin: 24px 0;
}
.quiz-title { font-size: 13px; font-weight: 700; color: var(--accent4); margin-bottom: 14px; letter-spacing: 0.05em; }
.quiz-q {
  font-size: 14px;
  color: var(--text);
  margin-bottom: 12px;
  line-height: 1.6;
}
.quiz-q .qn { color: var(--accent); font-family: 'JetBrains Mono', monospace; font-size: 12px; margin-right: 8px; }
.quiz-reveal {
  background: none;
  border: 1px dashed var(--border);
  color: var(--text-muted);
  font-size: 12px;
  padding: 6px 14px;
  border-radius: 4px;
  cursor: pointer;
  font-family: 'Space Grotesk', sans-serif;
  transition: all 0.2s;
  margin-top: 10px;
}
.quiz-reveal:hover { border-color: var(--accent); color: var(--accent); }
.quiz-answer {
  display: none;
  margin-top: 12px;
  padding: 12px 16px;
  background: rgba(63,185,80,0.07);
  border: 1px solid rgba(63,185,80,0.2);
  border-radius: 6px;
  font-size: 13.5px;
  line-height: 1.7;
  color: #c9d1d9;
}
.quiz-answer.show { display: block; }

/* ── SCROLLBAR ── */
/* ── BOOK CARDS ── */
.book-card {
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 20px 24px;
  margin-bottom: 16px;
  background: var(--surface);
  transition: border-color 0.2s, transform 0.15s;
}
.book-card:hover {
  border-color: var(--accent);
  transform: translateX(4px);
}
.book-card .level {
  display: inline-block;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 2px 10px;
  border-radius: 10px;
  margin-bottom: 8px;
}
.book-card .level.beginner { background: rgba(63,185,80,0.15); color: var(--accent2); }
.book-card .level.intermediate { background: rgba(88,166,255,0.15); color: var(--accent); }
.book-card .level.advanced { background: rgba(210,168,255,0.15); color: var(--accent4); }
.book-card .book-title {
  font-family: 'Noto Serif TC', serif;
  font-size: 17px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 2px;
}
.book-card .book-author {
  font-size: 13px;
  color: var(--text-muted);
  margin-bottom: 8px;
}
.book-card .book-desc {
  font-size: 14px;
  color: #c9d1d9;
  line-height: 1.7;
}

::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #484f58; }

/* ── CURSOR BLINK ── */
.cursor {
  display: inline-block;
  width: 8px;
  height: 14px;
  background: var(--terminal-green);
  vertical-align: middle;
  animation: blink 1s step-end infinite;
  margin-left: 2px;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

/* Typing animation */
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
.section { animation: fadeInUp 0.35s ease both; }
</style>
</head>
<body>

<!-- SIDEBAR -->
<nav id="sidebar">
  <div class="sidebar-logo">
    <h1>系統程式設計</h1>
    <p>Systems Programming · C/C++</p>
  </div>
  <div class="sidebar-nav" id="nav"></div>
</nav>

<!-- MAIN -->
<div id="main">
  <div id="topbar">
    <span id="bc-chapter">—</span>
    <span class="breadcrumb-sep">›</span>
    <span id="bc-section" class="breadcrumb-active">—</span>
  </div>
  <div id="content"></div>
</div>

<script>
// ══════════════════════════════════════════════════════════════════
// BOOK DATA
// ══════════════════════════════════════════════════════════════════
const BOOK = [
  {
    id: 'intro',
    title: '前言',
    icon: '📖',
    sections: [
      {
        id: 'intro-welcome',
        title: '歡迎與學習目標',
        content: () => `
          <div class="chapter-hero">
            <div class="chapter-tag">前言 · Introduction</div>
            <h1>系統程式設計<br>Systems Programming</h1>
            <p>從作業系統原理到編譯器設計，用 C/C++ 理解電腦如何真正運作。<br>
            每個概念都配備可互動的程式碼與模擬終端機執行結果。</p>
          </div>
          <div class="section">
            <p>系統程式（Systems Programming）是計算機科學中最核心、也最貼近硬體的領域。與應用程式開發不同，系統程式著重於如何讓電腦本身運作——管理處理器、記憶體、程序、以及如何把人類寫的程式碼轉換成機器可執行的指令。</p>
            <div class="note-box note-success">
              <div class="note-title">⚡ 本書特色</div>
              每個概念都搭配 C/C++ 程式碼範例，並內建終端機模擬器，點擊「▶ 執行」即可看到程式執行結果。
            </div>
            <h2 class="section-title"><span class="num">主題</span> 本書涵蓋四大領域</h2>
            <ul>
              <li><strong>作業系統原理</strong>：了解 OS 如何協調硬體與軟體，系統呼叫、核心模式</li>
              <li><strong>程序與執行緒</strong>：理解並行執行的機制，fork、exec、mutex 同步</li>
              <li><strong>記憶體管理</strong>：掌握 Stack、Heap、虛擬記憶體、Page Fault 運作</li>
              <li><strong>編譯器與直譯器</strong>：從原始碼到機器碼，詞法分析到程式碼生成</li>
            </ul>
          </div>
          <div class="section">
            <h2 class="section-title"><span class="num">環境</span> 開發環境建議</h2>
            ${terminal([
              { type: 'cmd', text: '# Ubuntu / WSL2 環境確認', prompt: '$' },
              { type: 'out', text: '' },
              { type: 'cmd', text: 'gcc --version', prompt: '$' },
              { type: 'out', text: 'gcc (Ubuntu 11.4.0-1ubuntu1~22.04) 11.4.0' },
              { type: 'cmd', text: 'uname -r', prompt: '$' },
              { type: 'out', text: '5.15.0-91-generic' },
              { type: 'cmd', text: 'echo "環境就緒，開始學習！"', prompt: '$' },
              { type: 'green', text: '環境就緒，開始學習！' },
            ])}
          </div>
        `
      }
    ]
  },
  {
    id: 'ch1',
    title: '第一章　作業系統原理',
    icon: '⚙️',
    sections: [
      {
        id: 'ch1-role',
        title: '1.1 作業系統的角色',
        content: () => `
          <div class="chapter-hero">
            <div class="chapter-tag">Chapter 1 · Operating System Principles</div>
            <h1>作業系統原理</h1>

            <h2 class="section-title"><span class="num">2.1</span> 什麼是程序？</h2>
            <p>程序（Process）是一個正在執行中的程式實體，包含：</p>
            <ul>
              <li>程式碼（Text Segment）</li>
              <li>目前 CPU 狀態（Registers、Program Counter）</li>
              <li>獨立的記憶體空間（Stack、Heap、Data）</li>
              <li>開啟的資源（檔案描述符等）</li>

            <h2 class="section-title"><span class="num">▸</span> fork() — 建立子程序</h2>
            <p><code style="color:var(--accent4);font-family:JetBrains Mono,monospace">fork()</code> 複製當前程序，父程序收到子程序 PID，子程序收到 0：</p>
            ${runnable('fork', `#include <stdio.h>
#include <unistd.h>
#include <sys/wait.h>

int main() {
    printf("fork() 之前，PID=%d\\n", getpid());

    pid_t pid = fork();

    if (pid < 0) {
        perror("fork 失敗");
        return 1;
    } else if (pid == 0) {
        // ── 子程序 ──
        printf("[子程序] PID=%d, 父PID=%d\\n",
               getpid(), getppid());
        printf("[子程序] 工作中...\\n");
        sleep(1);
        printf("[子程序] 完成！\\n");
        return 0;
    } else {
        // ── 父程序 ──
        printf("[父程序] PID=%d, 子程序PID=%d\\n",
               getpid(), pid);
        printf("[父程序] 等待子程序結束...\\n");
        wait(NULL);
        printf("[父程序] 子程序已結束，繼續執行\\n");
    }
    return 0;
}`, [

        content: () => `
          <div class="section">
            <h2 class="section-title"><span class="num">2.2</span> 執行緒（Thread）</h2>
            <p>執行緒是同一程序內的並行執行單元。同一程序的執行緒<strong>共享記憶體空間</strong>，但各自有獨立的 Stack 與暫存器。</p>
            <table class="comp-table">
              <tr><th>比較項目</th><th>程序 (Process)</th><th>執行緒 (Thread)</th></tr>
              <tr><td>記憶體空間</td><td>各自獨立</td><td>共享同一程序</td></tr>
              <tr><td>建立成本</td><td class="tag-red">高（需複製資源）</td><td class="tag-green">低（共享資源）</td></tr>
              <tr><td>通訊方式</td><td>IPC（管道、Socket）</td><td>直接讀寫共享記憶體</td></tr>
              <tr><td>安全性</td><td class="tag-green">高（互不干擾）</td><td class="tag-red">低（需同步機制）</td></tr>
            </table>
            ${runnable('pthread', `#include <pthread.h>
#include <stdio.h>
#include <unistd.h>

void *worker(void *arg) {
    int id = *(int *)arg;
    printf("[執行緒 %d] 開始執行\\n", id);
    for (int i = 1; i <= 3; i++) {
        printf("[執行緒 %d] 步驟 %d/3\\n", id, i);
        usleep(100000);  // 0.1 秒
    }
    printf("[執行緒 %d] 完成！\\n", id);
    return NULL;
}

int main() {
    pthread_t t1, t2, t3;
    int ids[] = {1, 2, 3};

    printf("主執行緒：建立 3 個工作執行緒\\n");
    pthread_create(&t1, NULL, worker, &ids[0]);
    pthread_create(&t2, NULL, worker, &ids[1]);
    pthread_create(&t3, NULL, worker, &ids[2]);

    pthread_join(t1, NULL);
    pthread_join(t2, NULL);
    pthread_join(t3, NULL);

    printf("主執行緒：所有工作完成！\\n");
    return 0;
}
// 編譯：gcc -pthread -o thread_demo thread_demo.c`, [

              { type: 'out', text: '主執行緒：所有工作完成！' },
            ])}
          </div>
          <div class="section">
            <h2 class="section-title"><span class="num">2.3</span> 競態條件與 Mutex</h2>
            <p>多執行緒同時寫入共享資料，可能導致<strong>競態條件（Race Condition）</strong>，結果不可預測。用 Mutex 保護臨界區間：</p>
            ${runnable('mutex', `#include <pthread.h>
#include <stdio.h>

int counter = 0;
pthread_mutex_t lock = PTHREAD_MUTEX_INITIALIZER;

void *increment(void *arg) {
    for (int i = 0; i < 100000; i++) {
        pthread_mutex_lock(&lock);   // 🔒 上鎖
        counter++;                   // 臨界區間（只能一個人進來）
        pthread_mutex_unlock(&lock); // 🔓 解鎖
    }
    return NULL;
}

int main() {
    pthread_t t1, t2;
    pthread_create(&t1, NULL, increment, NULL);
    pthread_create(&t2, NULL, increment, NULL);
    pthread_join(t1, NULL);
    pthread_join(t2, NULL);

    printf("有 Mutex 保護的結果: %d\\n", counter);
    printf("期望值:               %d\\n", 200000);
    printf("結果%s\\n",
           counter == 200000 ? "✓ 正確！" : "✗ 發生競態條件！");
    return 0;
}`, [
              { type: 'cmd', text: 'gcc -pthread -o mutex_demo mutex_demo.c && ./mutex_demo', prompt: '$' },
              { type: 'out', text: '有 Mutex 保護的結果: 200000' },
              { type: 'out', text: '期望值:               200000' },
              { type: 'green', text: '結果✓ 正確！' },
            ])}
            ${quiz([
              { q: 'fork() 後，父子程序各自修改同一個全域變數，會互相影響嗎？', a: '不會。fork() 後，父子程序有獨立的虛擬記憶體空間（Copy-on-Write）。一方修改變數時，OS 會複製該記憶體頁，雙方各自擁有獨立的副本。' },

            ])}
          </div>
        `

            <h2 class="section-title"><span class="num">3.1</span> 程序的記憶體佈局</h2>
            <p>每個 Linux 程序的虛擬記憶體空間由以下區段組成：</p>
            <div class="diagram"><pre>

  ┌──────────────────────────────────────┐
  │ <span style="color:#f85149;font-weight:700">Stack（堆疊）</span>         ↓ 往下成長       │  ← 區域變數、函式呼叫框架

  │ BSS Segment                          │  ← 未初始化的全域變數
  ├──────────────────────────────────────┤
  │ Data Segment                         │  ← 已初始化的全域/靜態變數
  ├──────────────────────────────────────┤
  │ <span style="color:#58a6ff;font-weight:700">Text Segment</span>（唯讀）                │  ← 程式碼

int global_init = 42;      // Data Segment
int global_uninit;         // BSS Segment

    static int static_var = 99;  // Data Segment

    int *heap_var = (int *)malloc(sizeof(int));
    *heap_var = 777;       // Heap

int main() {

        content: () => `
          <div class="section">
            <h2 class="section-title"><span class="num">3.2</span> malloc / free 動態配置</h2>
            <p>Heap 的記憶體需要程式設計師手動管理，忘記釋放會造成<strong>記憶體洩漏（Memory Leak）</strong>：</p>
            ${runnable('malloc', `#include <stdio.h>
#include <stdlib.h>
#include <string.h>

int main() {
    // ── 基本配置與釋放 ──
    int *arr = (int *)malloc(5 * sizeof(int));
    if (!arr) { fprintf(stderr, "記憶體不足！\\n"); return 1; }

    for (int i = 0; i < 5; i++) arr[i] = (i + 1) * 10;
    printf("配置 5 個 int：");
    for (int i = 0; i < 5; i++) printf("%d ", arr[i]);
    printf("\\n");

    // ── realloc 擴大 ──
    arr = (int *)realloc(arr, 10 * sizeof(int));
    for (int i = 5; i < 10; i++) arr[i] = (i + 1) * 10;
    printf("realloc 擴大到 10：");
    for (int i = 0; i < 10; i++) printf("%d ", arr[i]);
    printf("\\n");

    free(arr);   // 釋放記憶體
    arr = NULL;  // 防止懸空指標（重要！）

    // ── calloc：配置並歸零 ──
    int *zeros = (int *)calloc(5, sizeof(int));
    printf("calloc（自動歸零）：");
    for (int i = 0; i < 5; i++) printf("%d ", zeros[i]);
    printf("\\n");
    free(zeros);

    printf("所有記憶體已正確釋放 ✓\\n");
    return 0;

            <h2 class="section-title"><span class="num">4.2</span> 詞法分析器（Lexer）</h2>
            <p>Lexer 將原始碼切割成 Token，是編譯器的第一步：</p>
            ${runnable('lexer', `#include <stdio.h>
#include <ctype.h>
#include <string.h>

typedef enum {
    TOK_KEYWORD, TOK_IDENT, TOK_NUMBER,
    TOK_PLUS, TOK_MINUS, TOK_MUL, TOK_DIV,
    TOK_ASSIGN, TOK_SEMI, TOK_EOF, TOK_UNKNOWN
} TokenType;

const char *type_name[] = {
    "KEYWORD","IDENT","NUMBER","PLUS","MINUS",
    "MUL","DIV","ASSIGN","SEMI","EOF","UNKNOWN"
};
const char *keywords[] = {"int","if","while","return",NULL};

typedef struct { TokenType type; char value[64]; } Token;
const char *src; int pos;

int is_keyword(const char *s) {
    for (int i = 0; keywords[i]; i++)
        if (strcmp(s, keywords[i]) == 0) return 1;
    return 0;
}

Token next_token() {
    Token t = {TOK_EOF, ""};
    while (src[pos]==' '||src[pos]=='\\t') pos++;
    if (!src[pos]) return t;

    if (isalpha(src[pos])) {
        int i = 0;
        while (isalnum(src[pos])) t.value[i++] = src[pos++];
        t.value[i] = 0;
        t.type = is_keyword(t.value) ? TOK_KEYWORD : TOK_IDENT;
    } else if (isdigit(src[pos])) {
        int i = 0;
        while (isdigit(src[pos])) t.value[i++] = src[pos++];
        t.value[i] = 0; t.type = TOK_NUMBER;
    } else {
        t.value[0] = src[pos]; t.value[1] = 0;
        switch(src[pos++]) {
            case '+': t.type=TOK_PLUS; break;
            case '-': t.type=TOK_MINUS; break;
            case '*': t.type=TOK_MUL; break;
            case '=': t.type=TOK_ASSIGN; break;
            case ';': t.type=TOK_SEMI; break;
            default:  t.type=TOK_UNKNOWN;
        }
    }
    return t;
}

int main() {
    src = "int sum = 10 + count;";
    pos = 0;
    printf("輸入: %s\\n\\n", src);
    printf("%-10s %-12s\\n", "類型", "值");
    printf("%-10s %-12s\\n", "----------", "------------");
    Token t;
    do {
        t = next_token();
        printf("%-12s \\"%s\\"\\n", type_name[t.type], t.value);
    } while (t.type != TOK_EOF);
    return 0;
}`, [

            <p>實作一個完整的算術表達式計算器，支援加減乘除與括號：</p>
            ${runnable('parser', `#include <stdio.h>
#include <ctype.h>

const char *expr; int epos;

int parse_expr();

int parse_factor() {
    while (expr[epos]==' ') epos++;
    if (expr[epos] == '(') {
        epos++;  // 跳過 '('
        int v = parse_expr();
        epos++;  // 跳過 ')'
        return v;
    }
    int n = 0;
    int neg = (expr[epos] == '-') ? (epos++, -1) : 1;
    while (isdigit(expr[epos])) n = n*10 + (expr[epos++]-'0');
    return neg * n;
}

int parse_term() {
    int v = parse_factor();
    while (1) {
        while(expr[epos]==' ') epos++;
        if (expr[epos]=='*') { epos++; v *= parse_factor(); }
        else if(expr[epos]=='/') { epos++; v /= parse_factor(); }
        else break;
    }
    return v;
}

int parse_expr() {
    int v = parse_term();
    while (1) {
        while(expr[epos]==' ') epos++;
        if (expr[epos]=='+') { epos++; v += parse_term(); }
        else if(expr[epos]=='-') { epos++; v -= parse_term(); }
        else break;
    }
    return v;
}

void eval(const char *e) {
    expr = e; epos = 0;
    printf("  %s = %d\\n", e, parse_expr());
}

int main() {
    printf("=== 遞迴下降運算式計算器 ===\\n");
    eval("3 + 4");
    eval("3 + 4 * 2");       // 優先順序
    eval("(3 + 4) * 2");     // 括號
    eval("100 - 20 * 3 + 5");
    eval("(10 + 5) * (4 - 1)");
    eval("2 * 3 * 4 * 5");
    return 0;
}`, [

            <h2 class="section-title"><span class="num">5.1</span> Shell 的 REPL 主迴圈</h2>
            <div class="diagram"><pre>
  Shell 主迴圈（REPL）

  ┌──────────────────────────────────────────────┐
  │  loop:                                       │
  │    1. <span style="color:#58a6ff">Read</span>   ── 顯示提示符，讀取輸入          │
  │    2. <span style="color:#d2a8ff">Eval</span>   ── 詞法分析，切割命令與參數    │
  │    3. <span style="color:#3fb950">Execute</span> ── fork() + execvp() 執行命令 │
  │    4. <span style="color:#e3b341">Wait</span>   ── waitpid() 等待子程序完成   │
  │    5. ← 回到 1                                │
  └──────────────────────────────────────────────┘
            </pre></div>
            ${runnable('shell', `#include <stdio.h>
#include <stdlib.h>
#include <string.h>
#include <unistd.h>
#include <sys/wait.h>

#define MAX_ARGS 64
#define MAX_LINE 256

// 詞法分析：切割輸入為 argv
int tokenize(char *line, char *argv[]) {
    int argc = 0;
    char *tok = strtok(line, " \\t\\n");
    while (tok && argc < MAX_ARGS - 1) {
        argv[argc++] = tok;
        tok = strtok(NULL, " \\t\\n");
    }
    argv[argc] = NULL;
    return argc;
}

void execute(char *argv[]) {
    // 內建命令：cd
    if (strcmp(argv[0], "cd") == 0) {
        const char *dir = argv[1] ? argv[1] : getenv("HOME");
        if (chdir(dir) != 0) perror("cd");
        return;
    }
    // 內建命令：exit
    if (strcmp(argv[0], "exit") == 0) {
        printf("Bye!\\n"); exit(0);
    }

    // 外部命令：fork + exec
    pid_t pid = fork();
    if (pid == 0) {
        execvp(argv[0], argv);
        fprintf(stderr, "minish: 找不到命令: %s\\n", argv[0]);
        exit(1);
    } else if (pid > 0) {
        int status;
        waitpid(pid, &status, 0);
    }
}

int main() {
    char line[MAX_LINE];
    char *argv[MAX_ARGS];
    printf("=== 迷你 Shell（輸入 exit 離開）===\\n");
    while (1) {
        char cwd[256];
        getcwd(cwd, sizeof(cwd));
        printf("\\033[32m%s\\033[0m $ ", cwd);
        fflush(stdout);
        if (!fgets(line, sizeof(line), stdin)) break;
        if (line[0] == '\\n') continue;
        int argc = tokenize(line, argv);
        if (argc == 0) continue;
        execute(argv);
    }
    return 0;
}`, [

            <h2 class="section-title"><span class="num">6.2</span> inode 與檔案系統架構</h2>
            <p>inode（index node）是 Unix 檔案系統的核心資料結構，儲存檔案的中繼資料（權限、大小、時間戳、資料區塊指標等）。</p>
            <div class="diagram"><pre>
  inode 結構（簡化）
  ┌──────────────────────────┐
  │ 檔案類型與權限 (mode)     │
  │ 擁有者 (UID/GID)          │
  │ 檔案大小                  │
  │ 時間戳 (atime/mtime/ctime)│
  │ 參考計數 (link count)     │
  │ 直接區塊指標 (12 個)      │
  │ 間接區塊指標              │
  │ 雙重間接區塊指標          │
  │ 三重間接區塊指標          │
  └──────────────────────────┘
            </pre></div>
            <h2 class="section-title"><span class="num">▸</span> 硬連結 vs 符號連結</h2>
            <p>硬連結指向同一個 inode；符號連結是一個特殊的檔案，其內容是目標路徑：</p>
            ${runnable('linkdemo', `#include <stdio.h>
#include <unistd.h>
#include <sys/stat.h>

int main() {
    // 建立原始檔案
    FILE *f = fopen("original.txt", "w");
    fprintf(f, "這是原始檔案\\n");
    fclose(f);

    // 建立硬連結（指向相同 inode）
    link("original.txt", "hardlink.txt");

    // 建立符號連結（指向路徑）
    symlink("original.txt", "symlink.txt");

    struct stat st1, st2, st3;
    stat("original.txt", &st1);
    stat("hardlink.txt", &st2);
    lstat("symlink.txt", &st3);

    printf("原始檔案  inode: %ld\\n", st1.st_ino);
    printf("硬連結    inode: %ld (相同！)\\n", st2.st_ino);
    printf("符號連結  inode: %ld (不同！)\\n", st3.st_ino);
    printf("link count: %ld\\n", st1.st_nlink);

    // 清理
    unlink("original.txt");
    unlink("hardlink.txt");
    unlink("symlink.txt");
    return 0;
}`, [

            <h1>行程間通訊 (IPC)</h1>
            <p>從 Pipe 到共享記憶體，學習程序之間如何交換資料與同步。</p>
          </div>
          <div class="section">
            <h2 class="section-title"><span class="num">7.1</span> 匿名管道（Anonymous Pipe）</h2>
            <p>pipe() 建立一個單向資料通道——回傳兩個 FD，fd[1] 寫入、fd[0] 讀取：</p>
            ${runnable('pipeno', `#include <stdio.h>
#include <stdlib.h>
#include <unistd.h>
#include <string.h>
#include <sys/wait.h>

int main() {
    int fd[2];
    if (pipe(fd) == -1)
        { perror("pipe"); return 1; }

    pid_t pid = fork();
    if (pid < 0) { perror("fork"); return 1; }

    if (pid == 0) {
        // 子程序：讀取
        close(fd[1]);  // 關閉寫入端
        char buf[256];
        ssize_t n = read(fd[0], buf, sizeof(buf)-1);
        if (n > 0) {
            buf[n] = '\\0';
            printf("[子程序] 收到: %s\\n", buf);
        }
        close(fd[0]);
    } else {
        // 父程序：寫入
        close(fd[0]);  // 關閉讀取端
        const char *msg = "Hello from parent!";
        write(fd[1], msg, strlen(msg));
        printf("[父程序] 傳送: %s\\n", msg);
        close(fd[1]);
        wait(NULL);
    }
    return 0;
}`, [

            ])}

              <div class="note-title">⚠️ Pipe 注意事項</div>
              務必關閉未使用的端：父程序關閉讀取端，子程序關閉寫入端。未使用的 FD 不關閉會導致讀取端無法收到 EOF。

          <div class="section">
            <h2 class="section-title"><span class="num">7.2</span> 共享記憶體</h2>
            <p>共享記憶體是<strong>最快的 IPC 機制</strong>——多個程序直接讀寫同一塊物理記憶體。必須搭配信號量同步：</p>
            ${runnable('shmdemo', `#include <stdio.h>
#include <stdlib.h>
#include <unistd.h>
#include <sys/mman.h>
#include <sys/wait.h>
#include <fcntl.h>
#include <semaphore.h>

#define SHM_SIZE 4096

int main() {
    // 建立共享記憶體
    int fd = shm_open("/myshm",
        O_CREAT | O_RDWR, 0644);
    ftruncate(fd, SHM_SIZE);

    // 映射到程序位址空間
    int *shared = (int *)mmap(NULL, SHM_SIZE,
        PROT_READ | PROT_WRITE, MAP_SHARED, fd, 0);
    *shared = 0;

    // 建立信號量（初始值 = 1）
    sem_t *sem = sem_open("/mysem",
        O_CREAT, 0644, 1);

    pid_t pid = fork();

    for (int i = 0; i < 100000; i++) {
        sem_wait(sem);    // 等待鎖
        (*shared)++;      // 臨界區
        sem_post(sem);    // 解鎖
    }

    if (pid == 0) exit(0);
    wait(NULL);

    printf("共享記憶體結果: %d\\n", *shared);
    printf("期望值:         %d\\n", 200000);
    printf("%s\\n", *shared == 200000 ?
        "✓ 同步成功！" : "✗ 同步失敗！");

    // 清理
    munmap(shared, SHM_SIZE); close(fd);
    shm_unlink("/myshm");
    sem_close(sem); sem_unlink("/mysem");
    return 0;
}`, [
              { type: 'cmd', text: 'gcc -pthread -o shm_demo shm_demo.c -lrt && ./shm_demo', prompt: '$' },
              { type: 'out', text: '共享記憶體結果: 200000' },
              { type: 'out', text: '期望值:         200000' },
              { type: 'green', text: '✓ 同步成功！' },
            ])}
            <div class="note-box">
              <div class="note-title">⚡ IPC 效能比較</div>
              共享記憶體 &gt;&gt;&gt; Pipe ≈ FIFO &gt; 訊息佇列 &gt; Socket（本地）&gt; Socket（網路）<br>
              共享記憶體之所以最快，是因為資料只在使用者空間操作，不需系統呼叫（除了初始 mmap()），也不需核心複製資料。
            </div>

            ])}

          <div class="section">
            <h2 class="section-title"><span class="num">8.2</span> 完整 TCP Echo Server</h2>
            <p>實作一個 Echo Server：收到什麼就送回什麼，展示 socket/bind/listen/accept 四大步驟：</p>
            ${runnable('tcpserver', `#include <stdio.h>
#include <stdlib.h>
#include <string.h>
#include <unistd.h>
#include <arpa/inet.h>

int main() {
    int port = 8888;

    // 1. socket() — 建立 TCP Socket
    int server_fd = socket(AF_INET, SOCK_STREAM, 0);
    if (server_fd < 0) { perror("socket"); return 1; }

    // 允許重複使用位址
    int opt = 1;
    setsockopt(server_fd, SOL_SOCKET,
        SO_REUSEADDR, &opt, sizeof(opt));

    // 2. bind() — 綁定位址與埠號
    struct sockaddr_in addr = {
        .sin_family = AF_INET,
        .sin_port = htons(port),
        .sin_addr = { htonl(INADDR_ANY) }
    };
    if (bind(server_fd, (struct sockaddr*)&addr,
            sizeof(addr)) < 0) {
        perror("bind"); return 1;
    }

    // 3. listen() — 監聽連線
    if (listen(server_fd, 5) < 0)
        { perror("listen"); return 1; }
    printf("Echo Server 啟動，監聽 port %d...\\n",port);

    // 4. accept() — 接受連線（阻塞）
    struct sockaddr_in client;
    socklen_t client_len = sizeof(client);
    int client_fd = accept(server_fd,
        (struct sockaddr*)&client, &client_len);

    char ip[INET_ADDRSTRLEN];
    inet_ntop(AF_INET, &client.sin_addr, ip, sizeof(ip));
    printf("客戶端連線: %s:%d\\n", ip,
           ntohs(client.sin_port));

    // 5. Echo 迴圈
    char buf[1024]; ssize_t n;
    while ((n = recv(client_fd, buf, 1024, 0)) > 0)
        send(client_fd, buf, n, 0);

    printf("連線關閉\\n");
    close(client_fd);
    close(server_fd);
    return 0;
}`, [

// UI HELPERS
// ══════════════════════════════════════════════════════════════════

function colorLine(line, type) {
  const cls = { out:'t-out', green:'t-green', blue:'t-blue', red:'t-red', yellow:'t-yellow', purple:'t-purple', cyan:'t-cyan' };
  const c = cls[type] || 't-out';
  return `<div class="${c}">${escHtml(line)}</div>`;
}

function terminal(lines) {
  const rows = lines.map(l => {
    if (l.type === 'cmd') return `<div><span class="t-prompt">${escHtml(l.prompt||'$')}</span> <span class="t-cmd">${escHtml(l.text)}</span></div>`;
    return colorLine(l.text, l.type);
  }).join('');
  return `
  <div class="terminal-block">
    <div class="terminal-header">
      <div class="terminal-dots"><span class="dot-r"></span><span class="dot-y"></span><span class="dot-g"></span></div>
      <div class="terminal-title">bash — 模擬輸出</div>
    </div>
    <div class="terminal-body">${rows}</div>
  </div>`;
}

let runId = 0;
function runnable(id, code, outputLines) {
  const uid = 'run_' + (++runId);
  const output = outputLines.map(l => {
    if (l.type === 'cmd') return `<div><span class="t-prompt">${escHtml(l.prompt||'$')}</span> <span class="t-cmd">${escHtml(l.text)}</span></div>`;
    return colorLine(l.text, l.type);
  }).join('');

  // Syntax highlight
  const highlighted = syntaxHL(code);

  return `
  <div class="code-block" id="${uid}-wrap">
    <div class="code-header">
      <div class="code-dots"><span class="dot-r"></span><span class="dot-y"></span><span class="dot-g"></span></div>
      <div class="code-lang">C</div>
    </div>
    <div class="code-body">${highlighted}</div>
    <div class="run-wrap">
      <button class="run-btn" id="${uid}-btn" onclick="runCode('${uid}')">
        <span class="icon">▶</span> 執行程式
      </button>
    </div>
  </div>
  <div class="terminal-block" id="${uid}-term" style="display:none">
    <div class="terminal-header">
      <div class="terminal-dots"><span class="dot-r"></span><span class="dot-y"></span><span class="dot-g"></span></div>
      <div class="terminal-title">執行結果</div>
    </div>
    <div class="terminal-body" id="${uid}-out"></div>
  </div>
  <script>
  (function(){
    const outputData = ${JSON.stringify(outputLines)};
    window['${uid}_data'] = outputData;
  })();
  <\/script>`;
}

function quiz(qs) {
  const items = qs.map((q, i) => `
    <div style="margin-bottom:16px">
      <div class="quiz-q"><span class="qn">Q${i+1}.</span>${escHtml(q.q)}</div>
      <button class="quiz-reveal" onclick="toggleAnswer(this)">顯示解答 ▾</button>
      <div class="quiz-answer">${escHtml(q.a)}</div>
    </div>`).join('');
  return `<div class="quiz-box"><div class="quiz-title">🤔 思考題</div>${items}</div>`;
}

function interactiveTerminal() {
  return `
  <div class="interactive-terminal">
    <div class="interactive-header">
      <div class="terminal-dots"><span class="dot-r"></span><span class="dot-y"></span><span class="dot-g"></span></div>
      <div class="interactive-title">互動終端機 — 試輸入指令</div>
    </div>
    <div class="int-body" id="int-body">
      <div class="t-out">Linux 終端機模擬器 — 支援指令: ls, pwd, echo, date, whoami, uname, help, clear</div>
      <div class="t-out">─────────────────────────────────────────────────────</div>
    </div>
    <div class="int-input-row">
      <span class="int-prompt-label">user@linux:~$</span>
      <input class="int-input" id="int-input" placeholder="輸入指令..." autocomplete="off" spellcheck="false">
      <button class="int-enter" onclick="runInteractive()">Enter</button>
    </div>
  </div>`;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function syntaxHL(code) {
  const lines = code.split('\n');
  return lines.map(line => {
    let l = escHtml(line);
    // Comments
    l = l.replace(/(\/\/.*$)/g, '<span class="cm">$1</span>');
    if (!l.includes('cm')) {
      // Preprocessor
      l = l.replace(/^(\s*#\w+)/g, '<span class="pp">$1</span>');
      // Keywords
      l = l.replace(/\b(int|char|void|return|if|else|while|for|do|struct|typedef|enum|const|static|extern|sizeof|NULL|include|define|printf|fprintf|perror|malloc|calloc|realloc|free)\b/g, '<span class="kw">$1</span>');
      // Types
      l = l.replace(/\b(pid_t|pthread_t|pthread_mutex_t|ssize_t|TokenType|Token)\b/g, '<span class="ty">$1</span>');
      // Functions (word before '(')
      l = l.replace(/\b([a-zA-Z_]\w*)\s*(?=\()/g, '<span class="fn">$1</span>');
      // Strings
      l = l.replace(/(&quot;[^&]*&quot;)/g, '<span class="st">$1</span>');
      // Numbers
      l = l.replace(/\b(\d+)\b/g, '<span class="nm">$1</span>');
    }
    return l;
  }).join('\n');
}

// RUNTIME

window.runCode = function(uid) {
  const btn = document.getElementById(uid + '-btn');
  const term = document.getElementById(uid + '-term');
  const out = document.getElementById(uid + '-out');
  const data = window[uid + '_data'] || [];

  btn.classList.add('running');
  btn.innerHTML = '<span class="icon">⏳</span> 編譯中...';
  term.style.display = 'block';
  out.innerHTML = '';

  let i = 0;
  function step() {
    if (i >= data.length) {
      btn.classList.remove('running');
      btn.innerHTML = '<span class="icon">✓</span> 執行完畢';
      out.innerHTML += '<span class="cursor"></span>';
      return;
    }
    const l = data[i++];
    let html;
    if (l.type === 'cmd') {
      html = `<div><span class="t-prompt">${escHtml(l.prompt||'$')}</span> <span class="t-cmd">${escHtml(l.text)}</span></div>`;
    } else {
      const cls = { out:'t-out', green:'t-green', blue:'t-blue', red:'t-red', yellow:'t-yellow', purple:'t-purple', cyan:'t-cyan' };
      html = `<div class="${cls[l.type]||'t-out'}">${escHtml(l.text)}</div>`;
    }
    out.innerHTML += html;
    term.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    setTimeout(step, l.type === 'cmd' ? 400 : 80);
  }

  setTimeout(() => {
    btn.innerHTML = '<span class="icon">▶</span> 執行中...';
    step();
  }, 600);
};

window.toggleAnswer = function(btn) {
  const ans = btn.nextElementSibling;
  ans.classList.toggle('show');
  btn.textContent = ans.classList.contains('show') ? '隱藏解答 ▴' : '顯示解答 ▾';
};

// Interactive terminal commands
const INT_CMDS = {
  pwd: () => [{ t: 'out', v: '/home/user' }],
  ls: () => [{ t: 'out', v: 'Desktop  Documents  Downloads  minishell.c  a.out' }],
  'ls -la': () => [
    { t: 'out', v: 'total 56' },
    { t: 'out', v: 'drwxr-xr-x 2 user user  4096 Mar 25 15:00 .' },
    { t: 'out', v: 'drwxr-xr-x 8 user user  4096 Mar 25 14:00 ..' },
    { t: 'out', v: '-rw-r--r-- 1 user user   854 Mar 25 14:55 minishell.c' },
    { t: 'out', v: '-rwxr-xr-x 1 user user 16384 Mar 25 15:00 a.out' },
  ],
  whoami: () => [{ t: 'green', v: 'user' }],
  date: () => [{ t: 'out', v: new Date().toLocaleString('zh-TW') }],
  'uname -r': () => [{ t: 'out', v: '5.15.0-91-generic' }],
  'uname -a': () => [{ t: 'out', v: 'Linux ubuntu 5.15.0-91-generic #101-Ubuntu SMP x86_64 GNU/Linux' }],
  clear: () => '__clear__',
  help: () => [
    { t: 'blue', v: '可用指令：' },
    { t: 'out', v: '  ls [-la]    列出檔案' },
    { t: 'out', v: '  pwd         顯示目前路徑' },
    { t: 'out', v: '  whoami      顯示使用者名稱' },
    { t: 'out', v: '  date        顯示目前時間' },
    { t: 'out', v: '  uname [-a]  系統資訊' },
    { t: 'out', v: '  echo <msg>  輸出訊息' },
    { t: 'out', v: '  clear       清除畫面' },
  ],
};

window.runInteractive = function() {
  const input = document.getElementById('int-input');
  const body = document.getElementById('int-body');
  const cmd = input.value.trim();
  if (!cmd) return;
  input.value = '';

  // Show command
  body.innerHTML += `<div><span class="t-prompt">user@linux:~$</span> <span class="t-cmd">${escHtml(cmd)}</span></div>`;

  let handler = INT_CMDS[cmd];
  // echo
  if (!handler && cmd.startsWith('echo ')) {
    const msg = cmd.slice(5);
    handler = () => [{ t: 'out', v: msg }];
  }

  if (handler) {
    const res = handler();
    if (res === '__clear__') {
      body.innerHTML = '';
    } else {
      const cls = { out:'t-out', green:'t-green', blue:'t-blue', red:'t-red', yellow:'t-yellow' };
      res.forEach(r => {
        body.innerHTML += `<div class="${cls[r.t]||'t-out'}">${escHtml(r.v)}</div>`;
      });
    }
  } else {
    body.innerHTML += `<div class="t-red">minish: 找不到指令 '${escHtml(cmd)}'（輸入 help 查看可用指令）</div>`;
  }

  body.scrollTop = body.scrollHeight;
};

document.addEventListener('keydown', e => {
  const inp = document.getElementById('int-input');
  if (inp && document.activeElement === inp && e.key === 'Enter') runInteractive();
});

function buildNav() {
  const nav = document.getElementById('nav');
  BOOK.forEach(ch => {
    const div = document.createElement('div');
    div.className = 'nav-chapter';
    div.innerHTML = `<div class="nav-chapter-header" id="nch-${ch.id}">${ch.icon} ${ch.title}</div>`;
    ch.sections.forEach(sec => {
      const btn = document.createElement('button');
      btn.className = 'nav-section-btn';
      btn.id = 'nsec-' + sec.id;
      btn.textContent = sec.title;
      btn.onclick = () => navigate(ch.id, sec.id);
      div.appendChild(btn);
    });
    nav.appendChild(div);
  });
}

function navigate(chId, secId) {
  const ch = BOOK.find(c => c.id === chId);
  const sec = ch && ch.sections.find(s => s.id === secId);
  if (!sec) return;

  // Update breadcrumb
  document.getElementById('bc-chapter').textContent = ch.title;
  document.getElementById('bc-section').textContent = sec.title;

  // Render content
  const content = document.getElementById('content');
  content.innerHTML = sec.content();
  content.scrollTop = 0;

  // Update nav
  document.querySelectorAll('.nav-section-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.nav-chapter-header').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById('nsec-' + secId);
  if (btn) btn.classList.add('active');
  const chBtn = document.getElementById('nch-' + chId);
  if (chBtn) chBtn.classList.add('active');
}

buildNav();
navigate('intro', 'intro-welcome');
